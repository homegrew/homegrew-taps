name: Daily Tap Regeneration

on:
  schedule:
    - cron: '0 3 * * *'  # daily at 03:00 UTC, adjust as needed
  workflow_dispatch:        # allows manual runs from the Actions tab

jobs:
  regenerate:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Install genrepo
        run: go install github.com/homegrew/grew/tools/genrepo@main

      - name: Clean existing core/cask directories
        run: rm -rf core cask

      - name: Generate formula
        run: ~/go/bin/genrepo formula

      - name: Generate cask
        run: ~/go/bin/genrepo cask

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: regenerate formula and cask"
          git push
