name: freediameter
version: 1.6.0
description: Open source Diameter (Authentication) protocol implementation
homepage: https://github.com/freeDiameter/freeDiameter
license: BSD-3-Clause
caveats: |
    To configure freeDiameter, edit $HOMEBREW_PREFIX/etc/freeDiameter.conf to taste.

    Sample configuration files can be found in $HOMEBREW_CELLAR/freediameter/1.6.0/share/doc/freediameter.

    For more information about freeDiameter configuration options, read:
      http://www.freediameter.net/trac/wiki/Configuration

    Other potentially useful files can be found in $HOMEBREW_PREFIX/opt/freediameter/share/freediameter/contrib.
