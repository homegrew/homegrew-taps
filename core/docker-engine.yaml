name: docker-engine
version: 29.4.2
description: Pack, ship and run any application as a lightweight container (Daemon)
homepage: https://www.docker.com/
license: Apache-2.0
caveats: |
    To run dockerd as the current user, execute the following commands:
      brew install rootlesskit slirp4netns
      dockerd-rootless-setuptool.sh install

    NOTE: As the lifecycle of containerd is managed by dockerd,
          do NOT run `containerd-rootless-setuptool.sh install`
          before `dockerd-rootless-setuptool.sh install`.

    To run dockerd as the root user, use `brew services` with `sudo --preserve-env=HOME`.
dependencies:
    - containerd
    - nftables
    - runc
    - tini
bottle:
    linux_amd64:
        url: https://ghcr.io/v2/homebrew/core/docker-engine/blobs/sha256:8654af182229c543cb042291900e22c339fcd17c92491d780ec1c435da85c67b
        sha256: 8654af182229c543cb042291900e22c339fcd17c92491d780ec1c435da85c67b
    linux_arm64:
        url: https://ghcr.io/v2/homebrew/core/docker-engine/blobs/sha256:ab38f70952e03210e1c948c2d1e51ac20c2fcd27271a593129ee4b3f35d51343
        sha256: ab38f70952e03210e1c948c2d1e51ac20c2fcd27271a593129ee4b3f35d51343
source:
    url: https://github.com/moby/moby.git
build_dependencies:
    - go
    - go-md2man
    - pkgconf
service:
    run:
        - $HOMEBREW_PREFIX/opt/docker-engine/bin/dockerd
    run_type: immediate
