name: copyparty
version: 1.20.14
description: Portable file server
homepage: https://github.com/9001/copyparty
license: MIT
caveats: |
    If you need to generate thumbnails for video/audio files:
      brew install ffmpeg
    If you need to automatically create a CA and server-cert on startup:
      brew install cfssl
dependencies:
    - cryptography
    - libsodium
    - pillow
    - python@3.14
    - zeromq
    - gettext
