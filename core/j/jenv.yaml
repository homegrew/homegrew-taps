homepage: https://github.com/jenv/jenv
license: MIT
caveats: |
    To activate jenv, add the following to your shell profile e.g. ~/.profile
    or ~/.zshrc:
      export PATH="$HOME/.jenv/bin:$PATH"
      eval "$(jenv init -)"
