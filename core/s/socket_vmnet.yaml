name: socket_vmnet
version: 1.2.2
description: Daemon to provide vmnet.framework support for rootless QEMU
homepage: https://github.com/lima-vm/socket_vmnet
license: Apache-2.0
caveats: |
    socket_vmnet requires root privileges so you will need to run
      `sudo $HOMEBREW_PREFIX/opt/socket_vmnet/socket_vmnet` or `sudo brew services start socket_vmnet`.
    You should be certain that you trust any software you grant root privileges.
