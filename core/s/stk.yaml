description: Sound Synthesis Toolkit
homepage: https://ccrma.stanford.edu/software/stk/
license: MIT
caveats: |
    The header files have been put in a standard search path, it is possible to use an include statement in programs as follows:

      #include "stk/FileLoop.h"
      #include "stk/FileWvOut.h"

    src/ projects/ and rawwaves/ have all been copied to $HOMEBREW_PREFIX/opt/stk/share/stk
