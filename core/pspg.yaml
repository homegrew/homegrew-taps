name: pspg
version: 5.8.16
description: Unix pager optimized for psql
homepage: https://github.com/okbob/pspg
license: BSD-2-Clause
caveats: |
    Add the following line to your psql profile (e.g. ~/.psqlrc)
      \setenv PAGER pspg
      \pset border 2
      \pset linestyle unicode
dependencies:
    - libpq
    - ncurses
    - readline
