name: yubikey-agent
version: 0.1.6
description: Seamless ssh-agent for YubiKeys and other PIV tokens
homepage: https://github.com/FiloSottile/yubikey-agent
license: BSD-3-Clause
caveats: |
    To use this SSH agent, set this variable in your ~/.zshrc and/or ~/.bashrc:
      export SSH_AUTH_SOCK="$HOMEBREW_PREFIX/var/run/yubikey-agent.sock"
