name: wildfly-as
version: 40.0.0
description: Managed application runtime for building applications
homepage: https://www.wildfly.org/
license: Apache-2.0
caveats: |
    The home of WildFly Application Server 40.0.0 is:
      $HOMEBREW_PREFIX/opt/wildfly-as/libexec
    You may want to add the following to your .bash_profile:
      export JBOSS_HOME=$HOMEBREW_PREFIX/opt/wildfly-as/libexec
      export PATH=${PATH}:${JBOSS_HOME}/bin
