name: offlineimap
version: 8.0.2
description: Synchronizes emails between two repositories
homepage: https://github.com/OfflineIMAP/offlineimap3
license: GPL-2.0-or-later
caveats: |
    To get started, copy one of these configurations to ~/.offlineimaprc:
    * minimal configuration:
        cp -n $HOMEBREW_PREFIX/etc/offlineimap.conf.minimal ~/.offlineimaprc

    * advanced configuration:
        cp -n $HOMEBREW_PREFIX/etc/offlineimap.conf ~/.offlineimaprc
