name: qt@5
version: 5.15.18
description: Cross-platform application and UI framework
homepage: https://www.qt.io/
license: GFDL-1.3-only AND GPL-2.0-only AND GPL-3.0-only AND LGPL-2.1-only AND LGPL-3.0-only
caveats: |
    We agreed to the Qt open source license for you.
    If this is unacceptable you should uninstall.

    You can add Homebrew's Qt to QtCreator's "Qt Versions" in:
      Preferences > Qt Versions > Link with Qt...
    pressing "Choose..." and selecting as the Qt installation path:
      $HOMEBREW_PREFIX/opt/qt@5

    QtWebEngine is no longer included as its Chromium has unfixed vulnerabilities.
