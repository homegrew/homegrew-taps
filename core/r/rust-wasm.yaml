name: rust-wasm
version: 1.97.1
description: Rust standard library and sysroot for WebAssembly targets
homepage: https://www.rust-lang.org/
license: Apache-2.0 OR MIT
caveats: |
    Included targets: wasm32-unknown-unknown, wasm32-wasip1, wasm32-wasip2

    To cross-compile for, e.g., wasm32-unknown-unknown:
      cargo build --config $HOMEBREW_PREFIX/opt/rust-wasm/share/rust-wasm/cargo-config.toml --target wasm32-unknown-unknown
