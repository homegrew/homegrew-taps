head:
    url: https://gitlab.com/BuildGrid/buildbox/buildbox.git
    branch: master
build_dependencies:
    - cmake
    - gettext
    - nlohmann-json
    - pkgconf
    - tomlplusplus
service:
    run:
        - $HOMEBREW_PREFIX/opt/recc/bin/recc-server
        - --local-server-instance
        - recc-server
        - $HOMEBREW_PREFIX/var/recc/casd
    run_type: immediate
    working_dir: $HOMEBREW_PREFIX/var/recc
    log_path: $HOMEBREW_PREFIX/var/log/recc-server.log
    error_log_path: $HOMEBREW_PREFIX/var/log/recc-server-error.log
    keep_alive: true
