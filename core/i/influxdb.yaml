head:
    url: https://github.com/influxdata/influxdb.git
    branch: main
build_dependencies:
    - pkgconf
    - protobuf
    - rust
service:
    run:
        - $HOMEBREW_PREFIX/opt/influxdb/bin/influxdb3
        - serve
        - --node-id
        - default
        - --object-store
        - file
        - --data-dir
        - $HOMEBREW_PREFIX/var/lib/influxdb
    run_type: immediate
    working_dir: $HOMEBREW_PREFIX/var
    log_path: $HOMEBREW_PREFIX/var/log/influxdb/influxdb3.log
    error_log_path: $HOMEBREW_PREFIX/var/log/influxdb/influxdb3.log
    keep_alive: true
