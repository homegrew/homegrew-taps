source:
    url: https://github.com/charlie0129/batt.git
head:
    url: https://github.com/charlie0129/batt.git
    branch: master
build_dependencies:
    - go
service:
    run:
        - $HOMEBREW_PREFIX/opt/batt/bin/batt
        - daemon
        - --log-level=debug
        - --always-allow-non-root-access
        - --config=$HOMEBREW_PREFIX/etc/batt.json
    run_type: immediate
    log_path: $HOMEBREW_PREFIX/var/log/batt.log
    error_log_path: $HOMEBREW_PREFIX/var/log/batt.log
    keep_alive: true
