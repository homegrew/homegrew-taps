name: epics-base
version: 7.0.10
description: Experimental Physics and Industrial Control System
homepage: https://epics-controls.org/
license: EPICS
caveats: |+
    To use EPICS in the shell you have to put this here into shell configuration:
      export EPICS_BASE=$HOMEBREW_PREFIX/opt/epics-base/libexec
      export EPICS_HOST_ARCH=$($HOMEBREW_PREFIX/opt/epics-base/bin/EpicsHostArch.pl)

