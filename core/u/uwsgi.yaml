head:
    url: https://github.com/unbit/uwsgi.git
    branch: master
build_dependencies:
    - pkgconf
service:
    run:
        - $HOMEBREW_PREFIX/opt/uwsgi/bin/uwsgi
        - --uid
        - _www
        - --gid
        - _www
        - --master
        - --die-on-term
        - --autoload
        - --logto
        - $HOMEBREW_PREFIX/var/log/uwsgi.log
        - --emperor
        - $HOMEBREW_PREFIX/etc/uwsgi/apps-enabled
    run_type: immediate
    working_dir: $HOMEBREW_PREFIX
    keep_alive: true
