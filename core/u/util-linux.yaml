name: util-linux
version: 2.42.2
description: Collection of Linux utilities
homepage: https://github.com/util-linux/util-linux
license: BSD-3-Clause AND BSD-4-Clause-UC AND GPL-2.0-only AND GPL-2.0-or-later AND GPL-3.0-or-later AND LGPL-2.1-or-later AND LicenseRef-Homebrew-public-domain
caveats: |+
    The following tools are not supported for macOS, and are therefore not included:
    addpart
    agetty
    blkdiscard
    blkzone
    blockdev
    chcpu
    chmem
    choom
    chrt
    ctrlaltdel
    delpart
    dmesg
    eject
    fallocate
    fdformat
    fincore
    findmnt
    fsck
    fsfreeze
    fstrim
    hwclock
    ionice
    ipcrm
    ipcs
    kill
    last
    ldattach
    losetup
    lsblk
    lscpu
    lsipc
    lslocks
    lslogins
    lsmem
    lsns
    mount
    mountpoint
    nsenter
    partx
    pivot_root
    prlimit
    raw
    readprofile
    resizepart
    rfkill
    rtcwake
    script
    scriptlive
    setarch
    setterm
    sulogin
    swapoff
    swapon
    switch_root
    taskset
    umount
    unshare
    utmpdump
    uuidd
    wall
    wdctl
    zramctl

