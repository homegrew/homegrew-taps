name: uutils-diffutils
version: 0.5.0
description: Cross-platform Rust rewrite of the GNU diffutils
homepage: https://uutils.github.io/diffutils/
license: Apache-2.0 OR MIT
caveats: |
    All commands have been installed with the prefix "uu-".
    If you need to use these commands with their normal names, you
    can add a "uubin" directory to your PATH from your bashrc like:
      PATH="$HOMEBREW_PREFIX/opt/uutils-diffutils/libexec/uubin:$PATH"
