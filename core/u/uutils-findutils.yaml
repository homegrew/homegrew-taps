name: uutils-findutils
version: 0.8.0
description: Cross-platform Rust rewrite of the GNU findutils
homepage: https://uutils.github.io/findutils/
license: MIT
caveats: |
    Commands have been installed with the prefix "uu-".
    If you need to use these commands with their normal names, you
    can add a "uubin" directory to your PATH from your bashrc like:
      PATH="$HOMEBREW_PREFIX/opt/uutils-findutils/libexec/uubin:$PATH"
