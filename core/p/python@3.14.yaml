name: python@3.14
version: 3.14.5
description: Interpreted, interactive, object-oriented programming language
homepage: https://www.python.org/
license: Python-2.0
caveats: |
    Python is installed as
      $HOMEBREW_PREFIX/bin/python3

    Unversioned symlinks `python`, `python-config`, `pip` etc. pointing to
    `python3`, `python3-config`, `pip3` etc., respectively, are installed into
      $HOMEBREW_PREFIX/opt/python@3.14/libexec/bin

    `idle3.14` requires tkinter, which is available separately:
      brew install python-tk@3.14

    `dbm.gnu` is available separately:
      brew install python-gdbm@3.14

    For more information about Homebrew and Python, see: https://docs.brew.sh/Homebrew-and-Python
