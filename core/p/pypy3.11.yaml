name: pypy3.11
version: 7.3.23
description: Implementation of Python 3 in Python
homepage: https://pypy.org/
license: MIT
caveats: |
    The install-scripts folder is:
      $HOMEBREW_PREFIX/share/pypy3.11

    If you install Python packages via "pypy3.11 setup.py install" or pip_pypy3.11,
    any provided scripts will go into the install-scripts folder above. You may want to add
    it to your PATH *after* $HOMEBREW_PREFIX/bin so you don't overwrite tools from CPython.

    Setuptools and pip have been installed, so you can use pip_pypy3.11.
    These are managed by the formula and should not be modified.
