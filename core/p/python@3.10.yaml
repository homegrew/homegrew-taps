name: python@3.10
version: 3.10.20
description: Interpreted, interactive, object-oriented programming language
homepage: https://www.python.org/
license: Python-2.0
caveats: |
    Python is installed as
      $HOMEBREW_PREFIX/bin/python3.10

    Unversioned and major-versioned symlinks `python`, `python3`, `python-config`, `python3-config`, `pip`, `pip3`, etc. pointing to
    `python3.10`, `python3.10-config`, `pip3.10` etc., respectively, are installed into
      $HOMEBREW_PREFIX/opt/python@3.10/libexec/bin

    You can install Python packages with
      pip3.10 install <package>
    They will install into the site-package directory
      $HOMEBREW_PREFIX/lib/python3.10/site-packages

    `idle3.10` requires tkinter, which is available separately:
      brew install python-tk@3.10

    If you do not need a specific version of Python, and always want Homebrew's `python3` in your PATH:
      brew install python3

    See: https://docs.brew.sh/Homebrew-and-Python
