head:
    url: https://github.com/apache/pinot.git
    branch: master
service:
    run:
        - $HOMEBREW_PREFIX/opt/pinot/bin/pinot-admin
        - QuickStart
        - -type
        - BATCH
        - -dataDir
        - $HOMEBREW_PREFIX/var/lib/pinot/data
    run_type: immediate
    working_dir: $HOMEBREW_PREFIX/var/lib/pinot
    log_path: $HOMEBREW_PREFIX/var/log/pinot/pinot_output.log
    error_log_path: $HOMEBREW_PREFIX/var/log/pinot/pinot_output.log
    keep_alive: true
