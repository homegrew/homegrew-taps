        - $HOMEBREW_PREFIX/opt/pinot/bin/pinot-admin
        - QuickStart
        - -type
        - BATCH
        - -dataDir
        - $HOMEBREW_PREFIX/var/lib/pinot/data
    run_type: immediate
    working_dir: $HOMEBREW_PREFIX/var/lib/pinot
