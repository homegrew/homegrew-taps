name: libgxps
version: 0.3.2
description: GObject based library for handling and rendering XPS documents
homepage: https://wiki.gnome.org/Projects/libgxps
license: LGPL-2.1-or-later
caveats: |
    `ghostscript` now installs a conflicting libgxps.dylib.
    You may need to `brew unlink libgxps` if you have both installed.
dependencies:
    - cairo
    - freetype
    - glib
    - jpeg-turbo
    - libarchive
    - libpng
    - libtiff
    - little-cms2
    - gettext
keg_only: true
