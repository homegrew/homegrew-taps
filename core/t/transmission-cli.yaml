    - gettext
    - pkgconf
service:
    run:
        - $HOMEBREW_PREFIX/opt/transmission-cli/bin/transmission-daemon
        - --foreground
        - --config-dir
        - $HOMEBREW_PREFIX/var/transmission/
        - --log-info
        - --logfile
        - $HOMEBREW_PREFIX/var/transmission/transmission-daemon.log
    run_type: immediate
    keep_alive: true
