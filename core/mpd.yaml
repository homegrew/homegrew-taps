name: mpd
version: 0.24.9
description: Music Player Daemon
homepage: https://www.musicpd.org/
license: GPL-2.0-or-later
caveats: |
    MPD requires a config file to start.
    Please copy it from $HOMEBREW_PREFIX/etc/mpd/mpd.conf into one of these paths:
      - ~/.mpd/mpd.conf
      - ~/.mpdconf
    and tailor it to your needs.
dependencies:
    - chromaprint
    - faad2
    - ffmpeg
    - flac
    - fluid-synth
    - fmt
    - game-music-emu
    - icu4c@78
    - lame
    - libao
    - libid3tag
    - libmikmod
    - libmpdclient
    - libnfs
    - libnpupnp
    - libogg
    - libsamplerate
    - libshout
    - libsndfile
    - libsoxr
    - libvorbis
    - mpg123
    - opus
    - pcre2
    - sqlite
    - wavpack
