name: kics
version: 2.1.20
description: Detect vulnerabilities, compliance issues, and misconfigurations
homepage: https://kics.io/
license: Apache-2.0
caveats: |
    KICS queries are placed under $HOMEBREW_PREFIX/opt/kics/share/kics/assets/queries
    To use KICS default queries add KICS_QUERIES_PATH env to your ~/.zshrc or ~/.zprofile:
        "echo 'export KICS_QUERIES_PATH=$HOMEBREW_PREFIX/opt/kics/share/kics/assets/queries' >> ~/.zshrc"
    usage of CLI flag --queries-path takes precedence.
