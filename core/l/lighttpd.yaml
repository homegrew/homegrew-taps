name: lighttpd
version: 1.4.83
description: Small memory footprint, flexible web-server
homepage: https://www.lighttpd.net/
license: BSD-3-Clause
caveats: |
    Docroot is: $HOMEBREW_PREFIX/var/www

    The default port has been set in $HOMEBREW_PREFIX/etc/lighttpd/lighttpd.conf to 8080 so that
    lighttpd can run without sudo.
