build_dependencies:
    - autoconf
    - automake
    - libtool
    - pkgconf
service:
    run:
        - $HOMEBREW_PREFIX/opt/lighttpd/bin/lighttpd
        - -D
        - -f
        - $HOMEBREW_PREFIX/etc/lighttpd/lighttpd.conf
    run_type: immediate
    working_dir: $HOMEBREW_PREFIX
    log_path: $HOMEBREW_PREFIX/var/log/lighttpd/output.log
    error_log_path: $HOMEBREW_PREFIX/var/log/lighttpd/output.log
    keep_alive: true
