name: llvm@20
version: 20.1.8
description: Next-gen compiler infrastructure
homepage: https://llvm.org/
license: Apache-2.0 WITH LLVM-exception
caveats: |
    CLANG_CONFIG_FILE_SYSTEM_DIR: $HOMEBREW_PREFIX/etc/clang
    CLANG_CONFIG_FILE_USER_DIR:   ~/.config/clang

    LLD is now provided in a separate formula:
      brew install lld@20

    Using `clang`, `clang++`, etc., requires a CLT installation at `/Library/Developer/CommandLineTools`.
    If you don't want to install the CLT, you can write appropriate configuration files pointing to your
    SDK at ~/.config/clang.

    To use the bundled libunwind please use the following LDFLAGS:
      LDFLAGS="-L$HOMEBREW_PREFIX/opt/llvm@20/lib/unwind -lunwind"

    To use the bundled libc++ please use the following LDFLAGS:
      LDFLAGS="-L$HOMEBREW_PREFIX/opt/llvm@20/lib/c++ -L$HOMEBREW_PREFIX/opt/llvm@20/lib/unwind -lunwind"

    NOTE: You probably want to use the libunwind and libc++ provided by macOS unless you know what you're doing.
