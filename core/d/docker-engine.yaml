    darwin_amd64_14: https://github.com/moby/moby.git
    darwin_amd64_15: https://github.com/moby/moby.git
    darwin_arm64: https://github.com/moby/moby.git
    darwin_arm64_11: https://github.com/moby/moby.git
    darwin_arm64_12: https://github.com/moby/moby.git
    darwin_arm64_13: https://github.com/moby/moby.git
    darwin_arm64_14: https://github.com/moby/moby.git
    darwin_arm64_15: https://github.com/moby/moby.git
    linux_amd64: https://github.com/moby/moby.git
    linux_arm64: https://github.com/moby/moby.git
