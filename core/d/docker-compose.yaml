caveats: |
    Compose is a Docker plugin. For Docker to find the plugin, add "cliPluginsExtraDirs" to ~/.docker/config.json:
      "cliPluginsExtraDirs": [
          "$HOMEBREW_PREFIX/lib/docker/cli-plugins"
      ]
