name: apfel
version: 1.3.3
description: Apple Intelligence from the command-line, with OpenAi-compatible API server
homepage: https://apfel.franzai.com
license: MIT
bottle:
    darwin_arm64:
        url: https://ghcr.io/v2/homebrew/core/apfel/blobs/sha256:77874c88b5294810584793fedfdc3e2745cfba59162d120e6fb67b1c38feab1a
        sha256: 77874c88b5294810584793fedfdc3e2745cfba59162d120e6fb67b1c38feab1a
    darwin_arm64_16:
        url: https://ghcr.io/v2/homebrew/core/apfel/blobs/sha256:77874c88b5294810584793fedfdc3e2745cfba59162d120e6fb67b1c38feab1a
        sha256: 77874c88b5294810584793fedfdc3e2745cfba59162d120e6fb67b1c38feab1a
source:
    url: https://github.com/Arthur-Ficial/apfel/archive/refs/tags/v1.3.3.tar.gz
    sha256: c2c7975531066f31238f07d1339bf194b97701d3e8b5afe1fcdccb227b3a7daf
service:
    run:
        - $HOMEBREW_PREFIX/opt/apfel/bin/apfel
        - --serve
    run_type: immediate
    working_dir: $HOMEBREW_PREFIX/var
    log_path: $HOMEBREW_PREFIX/var/log/apfel.log
    error_log_path: $HOMEBREW_PREFIX/var/log/apfel.log
    keep_alive: true
