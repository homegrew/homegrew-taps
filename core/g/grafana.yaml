head:
    url: https://github.com/grafana/grafana.git
    branch: main
build_dependencies:
    - go
    - node
    - yarn
service:
    run:
        - $HOMEBREW_PREFIX/opt/grafana/bin/grafana
        - server
        - --config
        - $HOMEBREW_PREFIX/etc/grafana/grafana.ini
        - --homepath
        - $HOMEBREW_PREFIX/opt/grafana/share/grafana
        - --packaging=brew
        - cfg:default.paths.logs=$HOMEBREW_PREFIX/var/log/grafana
        - cfg:default.paths.data=$HOMEBREW_PREFIX/var/lib/grafana
        - cfg:default.paths.plugins=$HOMEBREW_PREFIX/var/lib/grafana/plugins
    run_type: immediate
    working_dir: $HOMEBREW_PREFIX/var/lib/grafana
    log_path: $HOMEBREW_PREFIX/var/log/grafana-stdout.log
    error_log_path: $HOMEBREW_PREFIX/var/log/grafana-stderr.log
    keep_alive: true
