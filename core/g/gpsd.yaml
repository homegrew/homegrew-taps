name: gpsd
version: 3.27.5
description: Global Positioning System (GPS) daemon
homepage: https://gpsd.gitlab.io/gpsd/
license: BSD-2-Clause
caveats: |
    gpsd does not automatically detect GPS device addresses. Once started, you
    need to force it to connect to your GPS:

      GPSD_SOCKET="$HOMEBREW_PREFIX/var/gpsd.sock" $HOMEBREW_CELLAR/gpsd/3.27.5/sbin/gpsdctl add /dev/tty.usbserial-XYZ
