    - scons
service:
    run:
        - $HOMEBREW_PREFIX/opt/gpsd/sbin/gpsd
        - -N
        - -F
        - $HOMEBREW_PREFIX/var/gpsd.sock
    run_type: immediate
    working_dir: $HOMEBREW_PREFIX
    log_path: $HOMEBREW_PREFIX/var/log/gpsd.log
    error_log_path: $HOMEBREW_PREFIX/var/log/gpsd.log
    keep_alive: true
