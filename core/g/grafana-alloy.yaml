    branch: main
build_dependencies:
    - go
    - node
service:
    run:
        - $HOMEBREW_PREFIX/opt/grafana-alloy/bin/alloy
        - run
        - --storage.path=$HOMEBREW_PREFIX/var/lib/grafana-alloy/data
        - $HOMEBREW_PREFIX/etc/grafana-alloy
    run_type: immediate
    log_path: $HOMEBREW_PREFIX/var/log/grafana-alloy.log
    error_log_path: $HOMEBREW_PREFIX/var/log/grafana-alloy.log
    keep_alive: true
