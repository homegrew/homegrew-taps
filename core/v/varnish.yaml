        - $HOMEBREW_PREFIX/etc/varnish/default.vcl
        - -s
        - malloc,1G
        - -T
        - 127.0.0.1:2000
        - -a
        - 127.0.0.1:8080
        - -F
    run_type: immediate
    working_dir: $HOMEBREW_PREFIX
    log_path: $HOMEBREW_PREFIX/var/varnish/varnish.log
    error_log_path: $HOMEBREW_PREFIX/var/varnish/varnish.log
    keep_alive: true
