description: Data science software focusing on R and Python
homepage: https://dailies.rstudio.com/
caveats: |
    rstudio@daily depends on R. The R Project provides official binaries:

      brew install --cask r-app

    Alternatively, the Homebrew-compiled version of R omits the GUI app:

      brew install r
