name: samsung-magician
version: 9.0.1.950
description: Manage Samsung internal and portable SSDs, memory cards, and USB flash drives
homepage: https://semiconductor.samsung.com/consumer-storage/support/tools/
caveats: |
    samsung-magician requires a kernel extension to work.
    If the installation fails, retry after you enable it in:
      System Settings → Privacy & Security

    For more information, refer to vendor documentation or this Apple Technical Note:
      https://developer.apple.com/library/content/technotes/tn2459/_index.html

    You must reboot for the installation of samsung-magician to take effect.
