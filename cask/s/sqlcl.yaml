name: sqlcl
version: 26.1.2.132.1334
description: Oracle SQLcl is the modern command-line interface for the Oracle Database
homepage: https://www.oracle.com/database/sqldeveloper/technologies/sqlcl/
caveats: |
    sqlcl requires Java 11+. You can install the latest version with:
      brew install --cask temurin

    To use sqlcl, you may need to add the $HOMEBREW_PREFIX/Caskroom/sqlcl/26.1.2.132.1334/sqlcl/bin directory
    to your PATH environment variable, e.g. (for Bash shell):
      export PATH=$HOMEBREW_PREFIX/Caskroom/sqlcl/26.1.2.132.1334/sqlcl/bin:"$PATH"
