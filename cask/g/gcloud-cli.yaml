name: gcloud-cli
version: 571.0.0
description: Set of tools to manage resources and applications hosted on Google Cloud
homepage: https://cloud.google.com/cli/
caveats: |
    To use additional binary components installed via gcloud, add the "$HOMEBREW_PREFIX/share/google-cloud-sdk/bin"
    directory to your PATH environment variable, e.g., (for Bash shell):
       export PATH=$HOMEBREW_PREFIX/share/google-cloud-sdk/bin:"$PATH"
